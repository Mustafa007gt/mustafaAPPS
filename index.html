<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مصطفى جيمرز</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: #0f0c29; /* تم إلغاء الأنيميشن الخلفي الممتد لتقليل استهلاك البطارية والثقل */
      background: linear-gradient(-45deg, #0f0c29, #1b183a, #24243e, #141414);
      color: #fff;
    }

    header {
      background-color: #000000aa;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 10px #00f7ff80;
      backdrop-filter: blur(8px);
    }

    header h1 {
      margin: 0;
      font-size: 1.8em;
      color: #fff;
      text-shadow: 0 0 10px #00f7ff, 0 0 20px #00f7ff;
    }

    #searchInput {
      padding: 8px 12px; 
      font-size: 14px; 
      border-radius: 8px; 
      border: 2px solid #00f7ff30; 
      outline: none;
      background-color: #121212;
      color: #fff;
      font-family: 'Cairo', sans-serif;
      transition: 0.3s;
    }

    #searchInput:focus {
      border-color: #00f7ff;
      box-shadow: 0 0 10px #00f7ff50;
    }

    .categories-container {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .category-btn {
      background: #121212dd;
      color: #fff;
      border: 1px solid #00f7ff50;
      padding: 8px 20px;
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      font-weight: bold;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px #00f7ff20;
    }

    .category-btn.active, .category-btn:hover {
      background: linear-gradient(90deg, #00f7ff, #ff00f7);
      border-color: transparent;
      box-shadow: 0 0 15px #00f7ff80;
      transform: translateY(-2px);
    }

    .games-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 25px;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .game-card {
      background: #121212dd;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 0 20px #00f7ff30;
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between; /* يمنع التداخل ويجعل الأزرار متناسقة بالأسفل دائمًا */
    }

    .game-card.hidden {
      display: none !important;
    }

    .game-card:hover {
      transform: scale(1.02);
      box-shadow: 0 0 25px #00f7ff80;
    }

    .badge-new {
      position: absolute;
      top: 15px;
      right: -35px;
      background: linear-gradient(45deg, #ff0055, #ff00a0);
      color: white;
      padding: 4px 35px;
      font-size: 12px;
      font-weight: bold;
      transform: rotate(45deg);
      box-shadow: 0 0 10px #ff0055;
      text-shadow: 0 0 5px #fff;
      z-index: 2;
      letter-spacing: 1px;
    }

    .img-container {
      width: 100%;
      height: 180px;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 15px;
      border: 1px solid #00f7ff20;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .game-card img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* يمنع التمطيط ويحافظ على أبعاد 16:9 العريضة */
      transition: transform 0.4s ease, filter 0.4s ease;
    }

    .game-card:hover .img-container {
      border-color: #00f7ff;
      box-shadow: 0 0 20px #00f7ffcc, 0 0 10px #ff00f750;
    }

    .game-card:hover img {
      transform: scale(1.06);
      filter: brightness(1.1);
    }

    .game-card h2 {
      color: #00f7ff;
      text-shadow: 0 0 5px #00f7ff;
      margin: 10px 0 5px 0;
      font-size: 1.4em;
    }

    .rating-stars {
      display: flex;
      justify-content: center;
      gap: 5px;
      margin-bottom: 10px;
      flex-direction: row-reverse; 
    }

    .rating-stars span {
      font-size: 22px;
      color: #444;
      cursor: pointer;
      transition: color 0.2s, transform 0.1s;
    }

    .rating-stars span:hover,
    .rating-stars span:hover ~ span,
    .rating-stars span.active,
    .rating-stars span.active ~ span {
      color: #ffcc00 !important;
      text-shadow: 0 0 10px #ffcc00;
    }

    .game-card p {
      color: #ccc;
      font-size: 14px;
      margin-bottom: 15px;
      min-height: 44px; /* يمنع لخبطة الكروت حتى لو كان النص سطر أو سطرين */
    }

    .card-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: center;
      margin-top: auto; /* يدفع الأزرار دائمًا للقاع بتناسق */
    }

    /* تحسين زر التحميل ليكون خفيفاً وسريعاً بدون أنيميشن ثقيل */
    .download-link {
      position: relative;
      display: inline-block;
      padding: 12px 20px;
      color: #fff;
      font-weight: bold;
      text-decoration: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #ff00f7, #00f7ff);
      box-shadow: 0 0 15px #00f7ff66;
      transition: all 0.2s ease;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      font-size: 16px;
      flex: 1;
    }

    .download-link.counting {
      background: #1a1a1a !important;
      border: 2px solid #ff00f7;
      box-shadow: 0 0 15px #ff00f780;
      pointer-events: none;
      color: #ff00f7 !important;
      text-shadow: 0 0 8px #ff00f7;
    }

    .download-link:not(.counting):hover {
      transform: translateY(-2px);
      box-shadow: 0 0 25px #00f7ffcc;
      filter: brightness(1.2);
    }

    .youtube-icon-btn {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: rgba(255, 0, 0, 0.1);
      border: 2px solid #ff0000;
      color: #ff3333;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      text-decoration: none;
      transition: all 0.2s ease;
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
    }

    .youtube-icon-btn:hover {
      background: #ff0000;
      color: #fff;
      box-shadow: 0 0 20px #ff0000;
      transform: translateY(-2px);
    }

    #toast-container {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .toast-notification {
      background: rgba(18, 18, 18, 0.95);
      border: 2px solid #00f7ff;
      color: #fff;
      padding: 12px 25px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      box-shadow: 0 0 15px #00f7ff80;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 250px;
      max-width: 350px;
      transform: translateX(120%);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s;
      opacity: 0;
    }

    .toast-notification.show {
      transform: translateX(0);
      opacity: 1;
    }

    footer {
      background-color: rgba(6, 5, 15, 0.9);
      margin-top: 60px;
      padding: 30px 20px;
      text-align: center;
      position: relative;
      border-top: 2px solid #ff00f7;
      box-shadow: 0 -5px 25px rgba(255, 0, 247, 0.15);
    }

    .footer-content {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .social-links {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin: 10px 0;
    }

    .social-icon {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: #121212;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      text-decoration: none;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .social-icon.youtube:hover { color: #ff0000; border-color: #ff0000; box-shadow: 0 0 15px rgba(255, 0, 0, 0.6); }
    .social-icon.telegram:hover { color: #0088cc; border-color: #0088cc; box-shadow: 0 0 15px rgba(0, 136, 204, 0.6); }
  </style>
</head>
<body>

  <div id="toast-container"></div>

  <header>
    <div style="display: flex; align-items: center; gap: 15px;">
      <input id="searchInput" type="text" placeholder="ابحث عن تطبيق..." />
      <h1>مصطفى جيمرز</h1>
    </div>
  </header>

  <div class="categories-container">
    <button class="category-btn active" onclick="filterCategory('all')">الكل</button>
    <button class="category-btn" onclick="filterCategory('open-world')">عالم مفتوح</button>
    <button class="category-btn" onclick="filterCategory('cars')">سيارات وشاحنات</button>
    <button class="category-btn" onclick="filterCategory('sports')">رياضة كرة قدم</button>
    <button class="category-btn" onclick="filterCategory('action')">أكشن وقتال</button>
    <button class="category-btn" onclick="filterCategory('horror')">رعب وغموض</button>
  </div>

  <main class="games-container">

    <div class="game-card" data-category="action">
      <div class="badge-new">الافضل</div>
      <div class="img-container"><img src="images/dan.jpg" alt="dust and neon" /></div>
      <h2>dust and neon</h2>
      <div class="rating-stars" data-stars="5"><span data-value="5">★</span><span data-value="4">★</span><span data-value="3">★</span><span data-value="2">★</span><span data-value="1">★</span></div>
      <p>لعبة اكشن بطابع غربي ممتعة جداً لجوالك.</p>
      <div class="card-actions">
        <a class="download-link" href="#" onclick="startDownload(event, this, 'https://modsfire.com/')">تحميل</a>
        <a class="youtube-icon-btn" href="https://youtu.be/" target="_blank"><i class="fab fa-youtube"></i></a>
      </div>
    </div>

    <div class="game-card" data-category="action">
      <div class="img-container"><img src="images/ps2ao.jpg" alt="ps2aoclub" /></div>
      <h2>ps2aoclub</h2>
      <div class="rating-stars" data-stars="5"><span data-value="5">★</span><span data-value="4">★</span><span data-value="3">★</span><span data-value="2">★</span><span data-value="1">★</span></div>
      <p>تطبيق يحتوي على 100 لعبة PS2 يمكنك تنزيلها ولعبها مباشرة.</p>
      <div class="card-actions">
        <a class="download-link" href="#" onclick="startDownload(event, this, 'https://modsfire.com/')">تحميل</a>
        <a class="youtube-icon-btn" href="https://youtu.be/" target="_blank"><i class="fab fa-youtube"></i></a>
      </div>
    </div>

  </main>

  <footer>
    <div class="footer-content">
      <p>جميع الحقوق محفوظة © 2026</p>
      <div class="social-links">
        <a href="https://youtube.com/" target="_blank" class="social-icon youtube"><i class="fab fa-youtube"></i></a>
        <a href="https://t.me/mustafaGWZ" target="_blank" class="social-icon telegram"><i class="fab fa-telegram-plane"></i></a>
      </div>
    </div>
  </footer>

  <script>
    // جافاسكريبت الفلترة والبحث والعداد الذكي السريع
    const searchInput = document.getElementById('searchInput');
    const gameCards = document.querySelectorAll('.game-card');

    searchInput.addEventListener('input', () => {
      const query = searchInput.value.toLowerCase().trim();
      gameCards.forEach(card => {
        const title = card.querySelector('h2').textContent.toLowerCase();
        const desc = card.querySelector('p').textContent.toLowerCase();
        if(title.includes(query) || desc.includes(query)) {
          card.classList.remove('hidden');
        } else {
          card.classList.add('hidden');
        }
      });
    });

    function filterCategory(category) {
      document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      
      gameCards.forEach(card => {
        if(category === 'all' || card.getAttribute('data-category') === category) {
          card.classList.remove('hidden');
        } else {
          card.classList.add('hidden');
        }
      });
    }

    function startDownload(event, element, targetUrl) {
      event.preventDefault();
      if (element.classList.contains('counting')) return;

      element.classList.add('counting');
      let timeLeft = 5;
      element.textContent = `تجهيز.. (${timeLeft})`;

      const countdown = setInterval(() => {
        timeLeft--;
        if (timeLeft <= 0) {
          clearInterval(countdown);
          element.classList.remove('counting');
          element.textContent = 'تحميل';
          window.open(targetUrl, '_blank'); 
        } else {
          element.textContent = `تجهيز.. (${timeLeft})`;
        }
      }, 1000);
    }
  </script>
</body>
</html>
